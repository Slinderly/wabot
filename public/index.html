<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wabot - Control Terminal</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --primary: #238636;
            --accent: #58a6ff;
            --border: #30363d;
            --ok: #3fb950;
            --error: #f85149;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Courier New', 'Segoe UI', monospace; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { 
            width: 100%; 
            max-width: 1200px; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); 
        }
        h1 { 
            color: var(--accent); 
            margin-top: 0; 
            font-weight: 600; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-status {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .status-badge { 
            display: inline-block; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: bold;
            border: 1px solid;
        }
        .status-connected { 
            background: rgba(35, 134, 54, 0.2); 
            color: var(--ok); 
            border-color: var(--primary); 
        }
        .status-waiting { 
            background: rgba(187, 128, 9, 0.2); 
            color: #d29922; 
            border-color: #9e6a03; 
        }
        .status-disconnected {
            background: rgba(248, 81, 73, 0.2);
            color: var(--error);
            border-color: #da3633;
        }
        
        #qr-box { 
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            display: inline-block; 
            margin: 20px 0;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }
        
        .section {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
        }

        .section h3 {
            margin-top: 0;
            color: var(--accent);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .terminal { 
            background: #000; 
            color: var(--ok); 
            font-family: 'Courier New', monospace; 
            padding: 12px; 
            border-radius: 6px; 
            text-align: left; 
            overflow-y: auto; 
            height: 400px; 
            border: 1px solid var(--border);
            font-size: 12px;
            line-height: 1.6;
        }
        .terminal-line { 
            margin-bottom: 3px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .terminal-time { color: #666; margin-right: 8px; }
        
        .logs-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .logs-table th {
            background: var(--bg);
            color: var(--accent);
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
        }
        .logs-table td {
            padding: 8px;
            border-bottom: 1px solid var(--border);
        }
        .logs-table tr:hover {
            background: rgba(255,255,255,0.02);
        }
        .status-ok { color: var(--ok); }
        .status-error { color: var(--error); }

        .qr-section {
            text-align: center;
            margin: 20px 0;
        }
        .qr-section h3 {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ wabot Control Panel</h1>
        
        <div class="header-status">
            <span id="status-badge" class="status-badge status-disconnected">Iniciando...</span>
            <span style="font-size: 12px; color: #888;">Última actualización: <span id="last-update">--:--:--</span></span>
        </div>

        <div id="qr-section" class="qr-section" style="display: none;">
            <h3>📱 Escanea el código para conectar:</h3>
            <div id="qr-box"></div>
        </div>

        <div class="grid">
            <div class="section">
                <h3>🖥️ Consola en Tiempo Real</h3>
                <div class="terminal" id="terminal">
                    <div class="terminal-line"><span class="terminal-time">[--:--:--]</span> > wabot iniciando...</div>
                </div>
            </div>

            <div class="section">
                <h3>📊 Descargas Recientes</h3>
                <table class="logs-table">
                    <thead>
                        <tr>
                            <th>Estado</th>
                            <th>Título</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        <tr><td colspan="2" style="text-align: center; color: #666;">Esperando descargas...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let lastLogCount = 0;

        function updateTime() {
            const now = new Date();
            document.getElementById('last-update').innerText = now.toLocaleTimeString('es-ES');
        }

        function addTerminalLine(msg) {
            const terminal = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = 'terminal-line';
            const time = new Date().toLocaleTimeString('es-ES');
            line.innerHTML = `<span class="terminal-time">[${time}]</span> ${escapeHtml(msg)}`;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
            
            // Limitar a 500 líneas
            while (terminal.children.length > 500) {
                terminal.removeChild(terminal.firstChild);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function update() {
            try {
                const r = await fetch('/api/info');
                const d = await r.json();
                
                // Actualizar estado
                const badge = document.getElementById('status-badge');
                badge.innerText = d.status.toUpperCase();
                badge.className = 'status-badge ';
                if (d.status === 'Conectado') {
                    badge.className += 'status-connected';
                } else if (d.status === 'Esperando QR') {
                    badge.className += 'status-waiting';
                } else {
                    badge.className += 'status-disconnected';
                }

                // Actualizar QR
                const qrBox = document.getElementById('qr-box');
                const qrSection = document.getElementById('qr-section');
                if (d.qr) {
                    qrBox.innerHTML = `<img src="${d.qr}" style="width: 250px; border-radius: 8px;">`;
                    qrSection.style.display = 'block';
                } else {
                    qrSection.style.display = 'none';
                }

                // Actualizar consola en tiempo real
                if (d.console && d.console.length > 0) {
                    const terminal = document.getElementById('terminal');
                    const currentLineCount = terminal.children.length;
                    
                    // Mostrar solo las líneas nuevas
                    const linesToAdd = d.console.slice(0, Math.max(0, d.console.length - (currentLineCount - 1)));
                    
                    linesToAdd.reverse().forEach(log => {
                        const time = new Date(log.timestamp).toLocaleTimeString('es-ES');
                        const line = document.createElement('div');
                        line.className = 'terminal-line';
                        line.innerHTML = `<span class="terminal-time">[${time}]</span> ${escapeHtml(log.message)}`;
                        terminal.insertBefore(line, terminal.firstChild);
                    });
                    
                    // Mantener scroll al final
                    terminal.scrollTop = terminal.scrollHeight;
                }

                // Actualizar tabla de logs
                const logsBody = document.getElementById('logs-body');
                if (d.logs && d.logs.length > 0) {
                    logsBody.innerHTML = d.logs.map(l => {
                        const statusClass = l.status === 'OK' ? 'status-ok' : 'status-error';
                        const statusEmoji = l.status === 'OK' ? '✅' : '❌';
                        return `
                            <tr>
                                <td><span class="${statusClass}">${statusEmoji} ${l.status}</span></td>
                                <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(l.title)}</td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    logsBody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: #666;">Esperando descargas...</td></tr>';
                }
                
                updateTime();
            } catch(e) { 
                console.error('Error actualizando:', e); 
                addTerminalLine(`❌ Error de conexión: ${e.message}`);
            }
        }

        // Actualizar cada 2 segundos
        setInterval(update, 2000);
        update();
    </script>
</body>
</html>
