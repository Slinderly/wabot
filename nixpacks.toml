# Nixpacks configuration for Railway
[phases.setup]
# Instalar Python además de Node
packages = ["python3", "ffmpeg", "python3Packages.pip"]

[phases.install]
# Instalar dependencias Node
# pip instalará Python packages desde requirements.txt
install = [
  "npm install",
  "python3 -m pip install --upgrade pip",
  "python3 -m pip install -r requirements.txt"
]

[phases.build]
# No necesitas build Node, solo asegurar dependencias
build = ["echo 'Build phase complete'"]

[phases.start]
# Start command de Node
start = "npm start"

[env]
# Variables de entorno opcionales
RAILWAY_ENVIRONMENT = "production"
PORT = "5000"
